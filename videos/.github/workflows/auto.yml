name: Crear clips de video

on:
  workflow_dispatch:   # botón manual
  push:                # también se ejecuta al subir archivos

jobs:
  procesar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Ver estructura del proyecto
        run: ls -R

      - name: Instalar FFmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Ejecutar script
        run: python scripts/auto_clips.py

      - name: Subir clips generados
        uses: actions/upload-artifact@v4
        with:
          name: clips
          path: output/
